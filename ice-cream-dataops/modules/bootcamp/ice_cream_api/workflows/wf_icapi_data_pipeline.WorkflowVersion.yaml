workflowExternalId: wf_icapi_data_pipeline
version: '1'
workflowDefinition:
  description: 'Run tasks in sequence'
  tasks:
    - externalId: create_asset_hierarchy_task
      type: 'transformation'
      parameters:
        transformation:
          externalId: create_asset_hierarchy
          concurrencyPolicy: fail
        isAsyncComplete: false
      name: 'Task One : create_asset_hierarchy'
      description: Task 1
      retries: 3
      timeout: 3600
      onFailure: 'abortWorkflow'
    - externalId: contextualize_ts_assets_task
      type: 'transformation'
      parameters:
        transformation:
          externalId: contextualize_ts_assets
          concurrencyPolicy: fail
      name: 'Task Two : contextualize_ts_assets'
      description: Task 2
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: create_asset_hierarchy_task
    - externalId: icapi_datapoints_extractor_task
      type: 'function'
      parameters:
        function:
          externalId: icapi_datapoints_extractor
          data: { "hours": 1 }
        isAsyncComplete: false
      name: 'Task three : icapi_datapoints_extractor'
      description: Task 3
      retries: 3
      timeout: 3600
      onFailure: 'abortWorkflow'
      dependsOn:
        - externalId: contextualize_ts_assets_task
    - externalId: oee_timeseries_task
      type: 'function'
      parameters:
        function:
          externalId: oee_timeseries
          data: { "hours": 1 }
        isAsyncComplete: false
      name: 'Task Four : oee_timeseries'
      description: Task 4
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: icapi_datapoints_extractor_task

